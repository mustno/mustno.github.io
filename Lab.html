<!DOCTYPE html>
<html lang="de">
<head>
    <!-- deine bestehenden meta-tags und styles -->
    <script src="theme-init.js"></script>
</head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MustNo — Lab Platform</title>
<link rel="icon" type="image/png" href="/logo.png?v=1">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js"></script>

<style>
  :root {
    --bg-deep: #070d1a; --bg-mid: #0a1328; --bg-card: #0d1b35; --bg-card-hover: #112040;
    --grid-line: rgba(64, 120, 255, 0.12); --grid-line-bright: rgba(64, 120, 255, 0.25);
    --accent: #4078ff; --accent-glow: rgba(64, 120, 255, 0.4);
    --accent-green: #7fff00; --accent-green-dim: rgba(127, 255, 0, 0.15);
    --text-primary: #e8eeff; --text-dim: rgba(180, 200, 255, 0.5); --text-muted: rgba(100, 130, 200, 0.4);
    --border: rgba(64, 120, 255, 0.2); --border-bright: rgba(64, 120, 255, 0.5);
    --font-main: 'Syne', sans-serif;

    /* Lab Colors */
    --bg: #060c18; --text: #e4edff; --green: #5effa8; 
    --dim: rgba(160,190,255,.42); --muted: rgba(80,110,185,.38);
    --hdr-bg: rgba(6,12,24,.95); 
    --panel-bg: rgba(10, 18, 36, 0.6); --pixel-border: rgba(255,255,255,0.05);
  }

  body.theme-wii {
    --bg: #f4f4f4; --text: #444444; --green: #00a2e8; --accent: #00baff;
    --border: #d0d0d0; --dim: #777777; --hdr-bg: rgba(244,244,244,0.95);
    --font-main: 'Arial', sans-serif; --panel-bg: rgba(255,255,255,0.8);
    --pixel-border: rgba(0,0,0,0.05); --muted: #999999;
  }
  .theme-wii .grid, .theme-wii .scan { display: none; }

  body.theme-retro {
    --bg: #000000; --text: #00ff00; --green: #00ff00; --accent: #00ff00;
    --border: #00ff00; --dim: #00aa00; --hdr-bg: #000000; --font-main: 'Space Mono', monospace;
    --panel-bg: #001100; --pixel-border: rgba(0,255,0,0.1); --muted: #005500;
  }

  body.theme-cyberpunk {
    --bg: #090014; --text: #ffffff; --green: #00f0ff; --accent: #ff007c;
    --border: rgba(255, 0, 124, 0.3); --dim: #ff99cc; --hdr-bg: rgba(9,0,20,0.95);
    --font-main: 'Syne', sans-serif; --panel-bg: rgba(22, 0, 36, 0.6);
    --pixel-border: rgba(255, 0, 124, 0.1); --muted: #b057ff;
  }
  body.theme-custom {
  --dim: color-mix(in srgb, var(--text) 45%, transparent);
  --muted: color-mix(in srgb, var(--text) 25%, transparent);
  --panel-bg: color-mix(in srgb, var(--bg) 20%, #000000 80%);
  --pixel-border: color-mix(in srgb, var(--text) 15%, transparent);
  --hdr-bg: color-mix(in srgb, var(--bg) 80%, #000000 20%);
}


  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100%;height:100%;overflow:hidden;}
  body{background:var(--bg);color:var(--text);font-family:var(--font-main);cursor:none; transition: background 0.5s ease, color 0.5s ease;}

  /* Cursor immer GANZ VORNE */
  #cur{position:fixed;width:7px;height:7px;background:var(--green);border-radius:50%;pointer-events:none;z-index:99999999 !important;mix-blend-mode:screen;transition:transform .15s, background .2s;}
  body.theme-wii #cur { mix-blend-mode: normal; }

  .grid{position:fixed;inset:0;background-image:linear-gradient(color-mix(in srgb, var(--accent) 15%, transparent) 1px,transparent 1px),linear-gradient(90deg,color-mix(in srgb, var(--accent) 15%, transparent) 1px,transparent 1px);background-size:64px 64px;}
  .scan{position:fixed;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.02) 2px,rgba(0,0,0,.02) 4px);}

  /* ==========================================
     ── TOPBAR & AUDIO WIDGET ── 
     ========================================== */
  .topbar {
    position: fixed; top: 0; left: 0; right: 0; height: 56px; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px; background: var(--hdr-bg); border-bottom: 1px solid var(--border);
    backdrop-filter: blur(12px);
  }
  .tb-left { display:flex; align-items:center; gap:12px; z-index: 2; }
  .tb-right { display:flex; align-items:center; gap:14px; z-index: 2; }

  .tb-back { display:flex; align-items:center; gap:6px; font-family:'Space Mono',monospace; font-size:.58rem; letter-spacing:.1em; color:var(--dim); text-decoration:none; cursor:none; border:1px solid var(--border); padding:6px 10px; transition:color .2s,border-color .2s; border-radius: 4px; }
  .tb-back:hover { color:var(--green); border-color:var(--green); }
  .tb-title { font-family:'Space Mono',monospace; font-size:.72rem; font-weight:700; letter-spacing:.18em; color:var(--text); }
  .tb-title em { color:var(--green); font-style:normal; animation:blink 1.8s step-end infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  
  .tb-badge { display:flex; align-items:center; gap:5px; font-family:'Space Mono',monospace; font-size:.58rem; letter-spacing:.1em; color:var(--green); }
  .bdot { width:5px; height:5px; border-radius:50%; background:var(--green); box-shadow:0 0 6px var(--green); animation:pls 2s ease-in-out infinite; }
  @keyframes pls { 0%,100%{opacity:1} 50%{opacity:.35} }

  .theme-select { background: transparent; border: 1px solid var(--border); color: var(--dim); font-family: 'Space Mono', monospace; font-size: 0.6rem; padding: 4px 8px; outline: none; cursor: none; border-radius: 4px; }
  .theme-select option { background: var(--bg); color: var(--text); }
  .svg-icon { width: 16px; height: 16px; fill: currentColor; }

  /* Widget zentriert in der Navigationsleiste */
  #audio-widget {
    position: clamp(20px, 4vh, 40px); left: clamp(20px, 4vw, 56px); z-index: 10005;
    display: flex; gap: 14px; align-items: center;
    background: var(--glass, rgba(255, 255, 255, 0.05)); border: 1px solid var(--border, rgba(255,255,255,0.1));
    padding: 6px 8px 6px 6px;
    border-radius: calc(var(--proj-rad, 0px) / 2 + 12px); backdrop-filter: blur(12px);
    box-shadow: 0 4px 20px rgba(0,0,0,0.15); transition: border-color 0.3s, box-shadow 0.3s, transform 0.3s;
    overflow: hidden;
  }
  #audio-widget:hover { border-color: var(--accent, #4a7aff); box-shadow: 0 8px 30px color-mix(in srgb, var(--accent, #4a7aff) 20%, transparent); transform: translateY(-2px); }
  body.theme-wii #audio-widget { background: rgba(255, 255, 255, 0.85); border-color: #ccc; }
  
  .audio-eq { display: flex; gap: 3px; align-items: flex-end; height: 16px; width: 18px; }
  .eq-bar { width: 4px; background: var(--dim, #888); border-radius: 2px; height: 4px; transition: height 0.1s, background 0.3s; }
  #audio-widget.is-playing .eq-bar { background: var(--green, #5effa8); animation: eq-bounce 0.8s infinite alternate ease-in-out; box-shadow: 0 0 6px var(--green, #5effa8); }
  #audio-widget.is-playing .eq-bar:nth-child(2) { animation-delay: -0.4s; }
  #audio-widget.is-playing .eq-bar:nth-child(3) { animation-delay: -0.2s; }
  @keyframes eq-bounce { 0%, 20% { height: 4px; } 100% { height: 16px; } }
  
  .audio-info { display: flex; flex-direction: column; justify-content: center; min-width: 90px; }
  .audio-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 3px; gap: 12px; }
  .audio-label { font-family: 'Space Mono', monospace; font-size: 0.45rem; color: #888; letter-spacing: 0.25em; text-transform: uppercase; line-height: 1; }
  .audio-time { font-family: 'Space Mono', monospace; font-size: 0.45rem; color: #888; letter-spacing: 0.1em; transition: color 0.3s; line-height: 1; font-variant-numeric: tabular-nums; }
  
  .audio-track { font-family: 'Space Mono', monospace; font-size: 0.7rem; font-weight: 700; color: var(--text, #fff); letter-spacing: 0.15em; text-transform: uppercase; transition: color 0.3s; }
  #audio-widget.is-playing .audio-track { color: var(--accent, #4a7aff); }
  #audio-widget.is-playing .audio-time { color: color-mix(in srgb, var(--accent, #4a7aff) 80%, transparent); }
  
  .audio-controls { display: flex; gap: 6px; align-items: center; margin-left: 6px; padding-left: 14px; border-left: 1px solid var(--border, #444); }
  .audio-btn { background: transparent; border: none; color: var(--dim, #888); display: flex; align-items: center; justify-content: center; width: 21px; height: 21px; border-radius: 50%; cursor: none; transition: all 0.2s; }
  .audio-btn svg { width: 14px; height: 14px; fill: currentColor; }
  .audio-btn:hover { color: var(--bg, #000); background: var(--text, #fff); transform: scale(1.1); }
  #audio-widget.is-playing .audio-btn:hover { background: var(--green, #5effa8); }

  .audio-progress-bg { position: absolute; bottom: 0; left: 0; right: 0; height: 3px; background: color-mix(in srgb, var(--text) 10%, transparent); cursor: none; transition: height 0.2s ease, background 0.2s ease; }
  #audio-widget:hover .audio-progress-bg { height: 6px; background: color-mix(in srgb, var(--text) 20%, transparent); }
  
  /* DIE FARBE DER LEISTE: Sichtbar in Pausiert, Grün in Play */
  .audio-progress-fill { height: 100%; width: 0%; background: color-mix(in srgb, var(--text) 40%, transparent); pointer-events: none; transition: width 0.1s linear, background 0.3s; }
  #audio-widget.is-playing .audio-progress-fill { background: var(--green, #5effa8); box-shadow: 0 0 8px color-mix(in srgb, var(--green, #5effa8) 50%, transparent); }

  /* ── SPRITE ENGINE STYLES ── */
  #toast { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--panel-bg); border: 1px solid var(--green); padding: 12px 24px; font-family: 'Space Mono', monospace; font-size: 0.75rem; color: var(--green); z-index: 10000; transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); border-radius: 4px; backdrop-filter: blur(10px); pointer-events: none; box-shadow: 0 0 20px rgba(94, 255, 168, 0.2); letter-spacing: 0.05em; }
  #toast.show { transform: translateX(-50%) translateY(0); }

  #setup-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 5000; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
  .setup-box { background: var(--panel-bg); border: 1px solid var(--border); padding: 40px; border-radius: 8px; width: 100%; max-width: 460px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
  .setup-box h2 { font-size: 1.5rem; margin-bottom: 24px; color: var(--text); }
  .setup-box label { display: block; font-family: 'Space Mono', monospace; font-size: 0.65rem; letter-spacing: 0.1em; color: var(--green); text-transform: uppercase; margin-bottom: 8px; }
  .setup-box select, .setup-box input { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--border); color: var(--text); padding: 12px; font-family: 'Space Mono', monospace; font-size: 0.8rem; margin-bottom: 24px; border-radius: 4px; outline: none; cursor: none; }
  .setup-box select option { background: var(--bg); }
  .setup-box button { width: 100%; padding: 14px; background: var(--accent); color: #fff; border: none; font-family: 'Space Mono', monospace; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; cursor: none; clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 10px 100%, 0 calc(100% - 10px)); transition: background 0.2s, transform 0.2s; }
  .setup-box button:hover { background: var(--green); color: #000; transform: translateY(-2px); }

  .lab-container { position: absolute; top: 56px; left: 0; right: 0; bottom: 0; display: none; gap: 20px; padding: 20px; max-width: 1600px; margin: 0 auto; }
  .panel { background: var(--panel-bg); border: 1px solid var(--border); border-radius: 8px; backdrop-filter: blur(12px); display: flex; flex-direction: column; overflow: hidden; }
  .panel-header { padding: 10px 14px; border-bottom: 1px solid var(--border); font-family: 'Space Mono', monospace; font-size: 0.6rem; letter-spacing: 0.2em; color: var(--accent); text-transform: uppercase; flex-shrink: 0; }

  .sidebar { width: 260px; flex-shrink: 0; overflow-y: auto; }
  .tool-section { padding: 14px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .tool-btn { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; background: transparent; border: 1px solid var(--border); color: var(--dim); padding: 8px 12px; margin-bottom: 6px; font-family: 'Space Mono', monospace; font-size: 0.65rem; text-transform: uppercase; cursor: none; transition: all 0.2s; border-radius: 4px; }
  .tool-btn:hover, .tool-btn.active { background: color-mix(in srgb, var(--accent) 15%, transparent); color: var(--text); border-color: var(--accent); }
  .tool-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 14px; }
  .tool-grid.three { grid-template-columns: 1fr 1fr 1fr; }
  .tool-btn.half, .tool-btn.third { margin-bottom: 0; }

  .brush-slider-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .brush-slider-row input { width: 100px; cursor: none; }

  .color-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 4px; margin-top: 10px; }
  .color-swatch { 
    aspect-ratio: 1; border-radius: 3px; border: 1px solid rgba(255,255,255,0.2); 
    cursor: none; transition: transform 0.1s, box-shadow 0.2s; 
    background-color: #111;
    background-image: 
      linear-gradient(45deg, #333 25%, transparent 25%, transparent 75%, #333 75%, #333),
      linear-gradient(45deg, #333 25%, transparent 25%, transparent 75%, #333 75%, #333);
    background-size: 8px 8px;
    background-position: 0 0, 4px 4px;
    overflow: hidden;
  }
  .color-swatch.active { transform: scale(1.2); box-shadow: 0 0 8px #fff; z-index: 2; border-color: #fff; }
  .custom-color-row { display: flex; gap: 8px; align-items: center; margin-top: 10px; }
  #custom-picker { flex: 1; height: 28px; padding: 0; border: 1px solid var(--border); border-radius: 4px; cursor: none; background: none; }
  #custom-picker::-webkit-color-swatch-wrapper { padding: 0; }
  #custom-picker::-webkit-color-swatch { border: none; border-radius: 3px; }
  #custom-alpha { flex: 1; cursor: none; }
  .btn-add-color { background: transparent; border: 1px solid var(--border); color: var(--green); width: 28px; height: 28px; border-radius: 4px; cursor: none; transition: all 0.2s; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .btn-add-color:hover { background: var(--green); color: #000; }
  #recent-grid { max-height: 120px; overflow-y: auto; align-content: flex-start; padding-right: 4px; }

  .workspace { flex: 1; display: flex; flex-direction: column; position: relative; overflow: hidden; }
  .zoom-controls { position: absolute; top: 14px; right: 14px; display: flex; gap: 6px; z-index: 50; }
  .zoom-btn { background: var(--panel-bg); border: 1px solid var(--border); color: var(--text); width: 32px; height: 32px; border-radius: 4px; display: flex; align-items: center; justify-content: center; cursor: none; transition: all 0.2s; backdrop-filter: blur(8px); }
  .zoom-btn:hover { background: var(--accent); border-color: var(--accent); color: #fff; transform: scale(1.1); }

  .canvas-wrapper { background: rgba(0,0,0,0.5); border-radius: 8px; width: 100%; height: 100%; border: 1px solid var(--border); box-shadow: inset 0 0 30px rgba(0,0,0,0.8); overflow: auto; display: flex; scroll-behavior: auto; }
  #canvas-container { 
    position: relative; margin: auto; box-shadow: 0 0 40px rgba(0,0,0,0.5); border: 1px solid var(--border); 
    background-color: #111;
    background-image: 
      linear-gradient(45deg, #222 25%, transparent 25%, transparent 75%, #222 75%, #222),
      linear-gradient(45deg, #222 25%, transparent 25%, transparent 75%, #222 75%, #222);
    background-size: 16px 16px;
    background-position: 0 0, 8px 8px;
  }
  #main-canvas, #selection-overlay, #cursor-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: block; image-rendering: pixelated; pointer-events: none; }
  #main-canvas { pointer-events: auto; }
  #grid-overlay { position: absolute; inset: 0; pointer-events: none; background-image: linear-gradient(to right, var(--pixel-border) 1px, transparent 1px), linear-gradient(to bottom, var(--pixel-border) 1px, transparent 1px); }

  .right-bar { width: 300px; flex-shrink: 0; display: flex; flex-direction: column; }
  .preview-box { width: 100%; aspect-ratio: 1; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; border: 1px solid var(--border); border-radius: 4px; margin-bottom: 14px; overflow: hidden; }
  #preview-canvas { max-width: 100%; max-height: 100%; image-rendering: pixelated; object-fit: contain; }
  .fps-control { display: flex; align-items: center; justify-content: space-between; font-family: 'Space Mono', monospace; font-size: 0.6rem; color: var(--dim); }
  .fps-control input { width: 100px; cursor: none; }
  .list-container { flex: 1; overflow-y: auto; padding: 10px 14px; display: flex; flex-direction: column; gap: 6px; }
  .layer-list { flex: 0.5; border-bottom: 1px solid var(--border); }
  .frame-list { flex: 1; }
  .layer-item, .frame-item { display: flex; align-items: center; gap: 10px; padding: 6px 10px; border: 1px solid var(--border); border-radius: 4px; cursor: none; transition: all 0.2s; background: rgba(0,0,0,0.2); }
  .layer-item:hover, .frame-item:hover { border-color: var(--dim); }
  .layer-item.active, .frame-item.active { border-color: var(--green); background: color-mix(in srgb, var(--green) 10%, transparent); }
  .layer-item.locked { opacity: 0.4; border-color: rgba(255, 74, 74, 0.4); }

  .layer-item.drag-over-top { border-top: 2px solid var(--accent) !important; border-top-left-radius: 0; border-top-right-radius: 0; box-shadow: inset 0 2px 0 var(--accent); }
  .layer-item.drag-over-bottom { border-bottom: 2px solid var(--accent) !important; border-bottom-left-radius: 0; border-bottom-right-radius: 0; box-shadow: inset 0 -2px 0 var(--accent); }
  .layer-item.dragging { opacity: 0.4; border: 1px dashed var(--accent); }

  .item-thumb { width: 28px; height: 28px; background: #000; border: 1px solid var(--border); image-rendering: pixelated; object-fit: contain; }
  .item-label { font-family: 'Space Mono', monospace; font-size: 0.6rem; color: var(--text); flex: 1; pointer-events: none; }
  .item-btn { color: var(--dim); background: transparent; border: none; cursor: none; transition: color 0.2s; padding: 4px; display:flex; align-items:center; justify-content:center;}
  .item-btn:hover { color: #ff4a4a; transform: scale(1.1); }
  .lock-btn:hover { color: var(--green); transform: scale(1.1); }
  .frame-item.drag-over { border-top: 2px solid var(--accent); }
  .frame-item.dragging { opacity: 0.4; border: 1px dashed var(--accent); }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
</style>
<!-- THEME ENGINE FIX: Erzwingt konsistente Farben und frühes Laden -->
<style>
body.theme-wii { --bg: #f4f4f4 !important; --text: #444444 !important; --green: #00a2e8 !important; --accent: #00baff !important; --border: #d0d0d0 !important; --dim: #777777 !important; --muted: rgba(0, 162, 232, 0.2) !important; --glass: rgba(255, 255, 255, 0.9) !important; }
body.theme-retro { --bg: #000000 !important; --text: #00ff00 !important; --green: #00ff00 !important; --accent: #00ff00 !important; --dim: #00aa00 !important; --muted: #005500 !important; --border: #00aa00 !important; --glass: rgba(0, 0, 0, 0.9) !important; }
body.theme-cyberpunk { --bg: #09020f !important; --text: #fcee0a !important; --green: #00ff9f !important; --accent: #ff003c !important; --dim: rgba(252, 238, 10, 0.6) !important; --muted: rgba(255, 0, 60, 0.4) !important; --border: rgba(255, 0, 60, 0.3) !important; --glass: rgba(26, 6, 46, 0.85) !important; }
</style>
<script src="theme.js"></script>
</head>
<body>

<div id="cur"></div>
<div class="grid"></div>
<div class="scan"></div>

<div class="topbar">
  <div class="tb-left">
    <a href="/" class="tb-back">
      <svg class="svg-icon" viewBox="0 0 24 24" style="width:12px;height:12px;"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg> Projekte
    </a>
    <div class="tb-title">MUSTNO <em>/</em> LAB</div>
  </div>
  
  <!-- ── AUDIO WIDGET HIER EINGEFÜGT ── -->
  <div id="audio-widget">
    <div class="audio-eq"><div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div></div>
    <div class="audio-info">
      <div class="audio-header">
        <div class="audio-label">AMBIENCE</div>
        <div class="audio-time" id="bgm-time">0:00 / 0:00</div>
      </div>
      <div class="audio-track" id="bgm-track-name">TRACK 01</div>
    </div>
    <div class="audio-controls">
      <button class="audio-btn" onclick="toggleBGM()"><svg id="icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg><svg id="icon-pause" viewBox="0 0 24 24" style="display:none;"><path d="M14,19H18V5H14M6,19H10V5H6V19Z"/></svg></button>
      <button class="audio-btn" onclick="nextTrack()"><svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
    </div>
    <div class="audio-progress-bg" onclick="seekAudio(event)">
      <div class="audio-progress-fill" id="bgm-progress"></div>
    </div>
  </div>

  <div class="tb-right">
    <select class="theme-select" onchange="window.changeTheme(this.value)">
      <option value="">Cyber (Default)</option>
      <option value="theme-wii">Wii Style</option>
      <option value="theme-retro">Retro</option>
      <option value="theme-cyberpunk">Cyberpunk</option>

<script>
window.pauseAllGames = function() {}; // FIX: Verhindert Absturz beim Laden von Custom Themes aus dem Cache

// --- UTILS ---
function renderPaletteGrid(containerId, colorArray, isPreset) {
  const container = document.getElementById(containerId);
  container.innerHTML = '';
  colorArray.forEach(c => {
    const btn = document.createElement('div'); 
    btn.className = 'color-swatch' + (c === currentColor ? ' active' : '');
    
    const inner = document.createElement('div');
    inner.style.width = '100%'; inner.style.height = '100%';
    inner.style.backgroundColor = c;
    btn.appendChild(inner);

    btn.onclick = () => { 
      document.querySelectorAll('.color-swatch').forEach(el => el.classList.remove('active')); 
      btn.classList.add('active'); 
      currentColor = c; 
      setTool('draw'); 
    };
    container.appendChild(btn);
  });
  window.attachCursorEvents();
}

function hexToRgba(hex, a) {
  let r = parseInt(hex.slice(1, 3), 16);
  let g = parseInt(hex.slice(3, 5), 16);
  let b = parseInt(hex.slice(5, 7), 16);
  return `rgba(${r}, ${g}, ${b}, ${a})`;
}

// --- GIF WORKER FIX ---
let gifWorkerURL;
try {
    const workerStr = `importScripts('https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.worker.js');`;
    const workerBlob = new Blob([workerStr], { type: 'application/javascript' });
    gifWorkerURL = URL.createObjectURL(workerBlob);
} catch(e) {
    console.warn('GIF Worker konnte nicht geladen werden:', e);
}

// --- DATA ARCHITECTURE ---
let gridW = 16, gridH = 16;
let frames = [];
let layersCount = 1;
let layersLocked = [false];
let currentFrameIdx = 0, currentLayerIdx = 0;
let currentColor = '#ffffff', recentColors = [];
let currentTool = 'draw';
let isDrawing = false;

let selectionMask = [];
let hasSelection = false;
let isSelecting = false;
let selectStartX = 0, selectStartY = 0;
let lassoPath = [];

let isTransforming = false;
let clipboardBuffer = null;
let tOrigPixels = []; 
let tOrigW = 0, tOrigH = 0;
let tBounds = {x:0, y:0, w:0, h:0};
let tRotation = 0; 
let originalTransformBounds = {x:0, y:0, w:0, h:0};
let activeHandle = null;

let isPanning = false;
let startPanX = 0, startPanY = 0;

let animTimer = null, isAnimPlaying = true, animFrame = 0, fps = 8;
let onionSkinEnabled = false, symmetryEnabled = false, draggedFrameIdx = null, draggedLayerIdx = null;
let brushSize = 1, brushShape = 'square', currentZoom = 1;
let history = [], historyStep = -1, stateChanged = false;

const mainCanvas = document.getElementById('main-canvas');
const mainCtx = mainCanvas.getContext('2d', { willReadFrequently: true });
const prevCanvas = document.getElementById('preview-canvas');
const prevCtx = prevCanvas.getContext('2d');
const selCanvas = document.getElementById('selection-overlay');
const selCtx = selCanvas.getContext('2d', { willReadFrequently: true });
const cursorCanvas = document.getElementById('cursor-overlay');
const cursorCtx = cursorCanvas.getContext('2d');
const canvasWrapper = document.getElementById('canvas-wrapper');
const canvasContainer = document.getElementById('canvas-container');

const cur = document.getElementById('cur');
document.addEventListener('mousemove', e => { 
  if (cur) {
    cur.style.left = e.clientX - 3.5 + 'px'; 
    cur.style.top = e.clientY - 3.5 + 'px'; 
    if(e.target.closest('#canvas-container')) cur.style.opacity = '0';
    else cur.style.opacity = '1';
  }

function drawBrushPreview(x, y) {
  const w_px = cursorCanvas.width; const h_px = cursorCanvas.height;
  const scaleX = w_px / gridW; const scaleY = h_px / gridH;
  cursorCtx.clearRect(0, 0, w_px, h_px);

  if (currentTool === 'pan' || currentTool.startsWith('select') || isTransforming || currentTool === 'picker' || currentTool === 'fill') return;

  cursorCtx.fillStyle = (currentTool === 'erase') ? 'rgba(255, 0, 0, 0.4)' : currentColor;
  cursorCtx.globalAlpha = 0.5;

  const r1 = Math.floor((brushSize - 1) / 2); const r2 = Math.floor(brushSize / 2);
  for (let dy = -r1; dy <= r2; dy++) {
    for (let dx = -r1; dx <= r2; dx++) {
      if (brushShape === 'circle' && brushSize > 2) {
        if (brushSize === 3 && Math.abs(dx) === 1 && Math.abs(dy) === 1) continue; 
        if (brushSize > 3 && Math.sqrt(dx*dx + dy*dy) >= brushSize / 2) continue;
      }
      let nx = x + dx; let ny = y + dy;
      if (nx >= 0 && nx < gridW && ny >= 0 && ny < gridH) {
        cursorCtx.fillRect(nx * scaleX, ny * scaleY, scaleX, scaleY);
      }
    }
  }
  cursorCtx.globalAlpha = 1.0;
}

// ── CANVAS INTERACTION ──
canvasContainer.addEventListener('mousedown', (e) => { 
  if (e.button === 1 || currentTool === 'pan') return;
  
  const rect = canvasContainer.getBoundingClientRect();
  const x = Math.floor((e.clientX - rect.left) * (gridW / rect.width));
  const y = Math.floor((e.clientY - rect.top) * (gridH / rect.height));

  if (isTransforming) {
      let cx = tBounds.x + tBounds.w/2; let cy = tBounds.y + tBounds.h/2;
      let dx = x - cx; let dy = y - cy;
      let localX = cx + dx * Math.cos(-tRotation) - dy * Math.sin(-tRotation);
      let localY = cy + dx * Math.sin(-tRotation) + dy * Math.cos(-tRotation);

      let hs = 3; 
      let rotHx = cx; let rotHy = tBounds.y - 4; 
      
      if (Math.abs(localX - rotHx) <= hs && Math.abs(localY - rotHy) <= hs*2) {
          activeHandle = 'rotate'; e.preventDefault(); return;
      }

      let hx = [tBounds.x, tBounds.x + tBounds.w, tBounds.x, tBounds.x + tBounds.w];
      let hy = [tBounds.y, tBounds.y, tBounds.y + tBounds.h, tBounds.y + tBounds.h];
      let hnames = ['nw', 'ne', 'sw', 'se'];

      for(let i=0; i<4; i++) {
          if (Math.abs(localX - hx[i]) <= hs && Math.abs(localY - hy[i]) <= hs) {
              activeHandle = hnames[i]; selectStartX = x; selectStartY = y;
              originalTransformBounds = {...tBounds}; e.preventDefault(); return;
          }
      }
      if (localX >= tBounds.x && localX <= tBounds.x + tBounds.w && localY >= tBounds.y && localY <= tBounds.y + tBounds.h) {
          activeHandle = 'move'; selectStartX = x; selectStartY = y;
          originalTransformBounds = {...tBounds}; e.preventDefault(); return;
      }
      commitTransform();
  }

  if (currentTool.startsWith('select')) {
      if (hasSelection && selectionMask[y * gridW + x]) {
          startTransform(x, y); 
      } else {
          hasSelection = false; selectionMask.fill(false); updateSelectionOverlay();
          isSelecting = true; selectStartX = x; selectStartY = y;
          if (currentTool === 'select-lasso') lassoPath = [{x,y}];
      }
      e.preventDefault(); return;
  }

  isDrawing = true; handleInteractionMouse(e); e.preventDefault(); 
});

canvasContainer.addEventListener('mousemove', (e) => { 
  const rect = canvasContainer.getBoundingClientRect();
  const x = Math.floor((e.clientX - rect.left) * (gridW / rect.width));
  const y = Math.floor((e.clientY - rect.top) * (gridH / rect.height));

  drawBrushPreview(x, y);

  if (isTransforming && activeHandle) {
      if (activeHandle === 'rotate') {
          let cx = tBounds.x + tBounds.w/2; let cy = tBounds.y + tBounds.h/2;
          tRotation = Math.atan2(y - cy, x - cx) + Math.PI/2;
      } else {
          let dx = x - selectStartX; let dy = y - selectStartY;
          let localDx = dx * Math.cos(-tRotation) - dy * Math.sin(-tRotation);
          let localDy = dx * Math.sin(-tRotation) + dy * Math.cos(-tRotation);

          if (activeHandle === 'move') {
              tBounds.x = originalTransformBounds.x + dx; tBounds.y = originalTransformBounds.y + dy;
          } else if (activeHandle === 'se') {
              tBounds.w = Math.max(1, originalTransformBounds.w + localDx); tBounds.h = Math.max(1, originalTransformBounds.h + localDy);
          } else if (activeHandle === 'nw') {
              let nw = Math.max(1, originalTransformBounds.w - localDx), nh = Math.max(1, originalTransformBounds.h - localDy);
              tBounds.x = originalTransformBounds.x + (originalTransformBounds.w - nw); tBounds.y = originalTransformBounds.y + (originalTransformBounds.h - nh);
              tBounds.w = nw; tBounds.h = nh;
          } else if (activeHandle === 'ne') {
              tBounds.w = Math.max(1, originalTransformBounds.w + localDx); let nh = Math.max(1, originalTransformBounds.h - localDy);
              tBounds.y = originalTransformBounds.y + (originalTransformBounds.h - nh); tBounds.h = nh;
          } else if (activeHandle === 'sw') {
              let nw = Math.max(1, originalTransformBounds.w - localDx); tBounds.x = originalTransformBounds.x + (originalTransformBounds.w - nw);
              tBounds.w = nw; tBounds.h = Math.max(1, originalTransformBounds.h + localDy);
          }
      }
      updateSelectionOverlay(); return;
  }

  if (isSelecting) {
      if (currentTool === 'select-lasso') {
          const lastPt = lassoPath[lassoPath.length-1];
          if(lastPt.x !== x || lastPt.y !== y) lassoPath.push({x,y});
      }
      updateSelectionOverlayDrag(x, y); return;
  }

  if(isDrawing && (currentTool === 'draw' || currentTool === 'erase')) { handleInteractionMouse(e); }
});

function handleInteractionMouse(e) {
  const rect = canvasContainer.getBoundingClientRect();
  const x = Math.floor((e.clientX - rect.left) * (gridW / rect.width));
  const y = Math.floor((e.clientY - rect.top) * (gridH / rect.height));
  if(x >= 0 && x < gridW && y >= 0 && y < gridH) { handleInteraction(y * gridW + x); }
}

canvasContainer.addEventListener('mouseleave', () => {
    cursorCtx.clearRect(0,0, cursorCanvas.width, cursorCanvas.height);
    if(isDrawing) { isDrawing = false; updateFramesList(); updateLayersList(); if(stateChanged) { saveState(); stateChanged = false; } }
    if(isSelecting) { isSelecting = false; finalizeSelection(); }
});

function getSelectionBounds() {
    let minX = gridW, minY = gridH, maxX = -1, maxY = -1;
    for (let i = 0; i < gridW * gridH; i++) {
        if (selectionMask[i]) {
            let x = i % gridW; let y = Math.floor(i / gridW);
            if (x < minX) minX = x; if (x > maxX) maxX = x;
            if (y < minY) minY = y; if (y > maxY) maxY = y;
        }
    }
    if (maxX < 0) return null;
    return { x: minX, y: minY, w: maxX - minX + 1, h: maxY - minY + 1 };
}

function extractSelectionToBuffer() {
    clipboardBuffer = new Array(gridW * gridH).fill(null);
    let layerData = frames[currentFrameIdx][currentLayerIdx];
    for (let i = 0; i < gridW * gridH; i++) {
        if (selectionMask[i] && layerData[i]) {
            clipboardBuffer[i] = layerData[i];
            layerData[i] = null;
        }
    }
}

function startTransform(x = null, y = null) {
    if (!hasSelection || isTransforming) return;
    if (layersLocked[currentLayerIdx]) { showToast('Ebene ist gesperrt!'); return; }
    
    saveState(); 
    extractSelectionToBuffer();

    tBounds = getSelectionBounds();
    if (!tBounds) { undo(); return; } 

    tOrigW = tBounds.w; tOrigH = tBounds.h;
    tRotation = 0;
    tOrigPixels = new Array(tOrigW * tOrigH).fill(null);
    
    for (let i = 0; i < gridW * gridH; i++) {
        if (clipboardBuffer[i]) {
            let ox = (i % gridW) - tBounds.x; let oy = Math.floor(i / gridW) - tBounds.y;
            tOrigPixels[oy * tOrigW + ox] = clipboardBuffer[i];
        }
    }

    isTransforming = true;
    if(x !== null) {
        activeHandle = 'move'; selectStartX = x; selectStartY = y;
        originalTransformBounds = {...tBounds};
    }
    setTool('transform');
    renderCanvas(); updateSelectionOverlay();
}

function commitTransform() {
    if (!isTransforming) return;
    
    const tempC = document.createElement('canvas');
    tempC.width = gridW; tempC.height = gridH;
    const tCtx = tempC.getContext('2d', { willReadFrequently: true });
    tCtx.imageSmoothingEnabled = false; 

    // Reconstruct Original Block for Transformation
    const tOrigDataCanvas = document.createElement('canvas');
    tOrigDataCanvas.width = tOrigW; tOrigDataCanvas.height = tOrigH;
    const odCtx = tOrigDataCanvas.getContext('2d');
    for (let y = 0; y < tOrigH; y++) {
        for (let x = 0; x < tOrigW; x++) {
            let col = tOrigPixels[y * tOrigW + x];
            if (col) { odCtx.fillStyle = col; odCtx.fillRect(x, y, 1, 1); }
        }
    }

    tCtx.save();
    tCtx.translate(tBounds.x + tBounds.w/2, tBounds.y + tBounds.h/2);
    tCtx.rotate(tRotation);
    tCtx.drawImage(tOrigDataCanvas, -tBounds.w/2, -tBounds.h/2, tBounds.w, tBounds.h);
    tCtx.restore();

    let imgData = tCtx.getImageData(0,0,gridW,gridH).data;
    let layerData = frames[currentFrameIdx][currentLayerIdx];
    let newMask = new Array(gridW * gridH).fill(false);

    for (let i = 0; i < gridW * gridH; i++) {
        let alpha = imgData[i*4 + 3];
        if (alpha > 5) {
            let r = imgData[i*4];
            let g = imgData[i*4+1];
            let b = imgData[i*4+2];
            let a = (alpha / 255).toFixed(3);
            layerData[i] = `rgba(${r},${g},${b},${a})`;
            newMask[i] = true;
        }
    }
    
    selectionMask = newMask;
    isTransforming = false; tOrigPixels = null; clipboardBuffer = null; activeHandle = null; tRotation = 0;
    hasSelection = selectionMask.some(v => v);
    setTool('select-rect');
    saveState(); renderCanvas(); updateSelectionOverlay();
}

function cancelTransform() {
    if (!isTransforming) return;
    isTransforming = false; tOrigPixels = null; clipboardBuffer = null; activeHandle = null; tRotation = 0;
    selectionMask.fill(false); hasSelection = false;
    selCtx.clearRect(0,0,selCanvas.width,selCanvas.height);
    undo(); showToast('Abgebrochen (Esc)');
    setTool('select-rect');
}

function updateSelectionOverlayDrag(currX, currY) {
    const w_px = selCanvas.width; const h_px = selCanvas.height;
    const scaleX = w_px / gridW; const scaleY = h_px / gridH;

    selCtx.clearRect(0, 0, w_px, h_px);
    selCtx.fillStyle = 'rgba(64, 120, 255, 0.35)';
    selCtx.strokeStyle = '#ffffff'; selCtx.setLineDash([4, 4]); selCtx.lineWidth = 1.5;

    let x = Math.min(selectStartX, currX); let y = Math.min(selectStartY, currY);
    let w = Math.abs(currX - selectStartX) + 1; let h = Math.abs(currY - selectStartY) + 1;

    if (currentTool === 'select-rect') {
        selCtx.fillRect(x * scaleX, y * scaleY, w * scaleX, h * scaleY);
        selCtx.strokeRect(x * scaleX, y * scaleY, w * scaleX, h * scaleY);
    } else if (currentTool === 'select-circle') {
        selCtx.beginPath(); 
        selCtx.ellipse((selectStartX + (currX-selectStartX)/2 + 0.5) * scaleX, (selectStartY + (currY-selectStartY)/2 + 0.5) * scaleY, (w/2) * scaleX, (h/2) * scaleY, 0, 0, Math.PI*2);
        selCtx.fill(); selCtx.stroke();
    } else if (currentTool === 'select-lasso') {
        if (lassoPath.length > 0) {
            selCtx.beginPath(); selCtx.moveTo((lassoPath[0].x + 0.5) * scaleX, (lassoPath[0].y + 0.5) * scaleY);
            for (let i = 1; i < lassoPath.length; i++) selCtx.lineTo((lassoPath[i].x + 0.5) * scaleX, (lassoPath[i].y + 0.5) * scaleY);
            selCtx.lineTo((currX + 0.5) * scaleX, (currY + 0.5) * scaleY); selCtx.fill(); selCtx.stroke();
        }
    }
}

function finalizeSelection() {
    selectionMask.fill(false);
    if (currentTool === 'select-lasso' && lassoPath.length > 2) {
        const points = lassoPath.map(p => [p.x, p.y]);
        for(let i=0; i<gridW*gridH; i++) {
            let px = i % gridW, py = Math.floor(i / gridW), inside = false;
            for (let j = 0, k = points.length - 1; j < points.length; k = j++) {
                let xi = points[j][0], yi = points[j][1], xj = points[k][0], yj = points[k][1];
                if (((yi > py) !== (yj > py)) && (px < (xj - xi) * (py - yi) / (yj - yi) + xi)) inside = !inside;
            }
            if(inside) selectionMask[i] = true;
        }
    } else {
        let lastX = selectStartX, lastY = selectStartY;
        if(event) {
            lastX = Math.floor((event.clientX - canvasContainer.getBoundingClientRect().left) * (gridW / canvasContainer.getBoundingClientRect().width));
            lastY = Math.floor((event.clientY - canvasContainer.getBoundingClientRect().top) * (gridH / canvasContainer.getBoundingClientRect().height));
        }
        let minX = Math.max(0, Math.min(selectStartX, lastX)), maxX = Math.min(gridW-1, Math.max(selectStartX, lastX));
        let minY = Math.max(0, Math.min(selectStartY, lastY)), maxY = Math.min(gridH-1, Math.max(selectStartY, lastY));
        let cx = selectStartX + (lastX-selectStartX)/2, cy = selectStartY + (lastY-selectStartY)/2;
        let rx = (maxX-minX+1)/2, ry = (maxY-minY+1)/2;

        for(let y = minY; y <= maxY; y++) {
            for(let x = minX; x <= maxX; x++) {
                if (currentTool === 'select-rect') selectionMask[y * gridW + x] = true;
                else if (currentTool === 'select-circle') {
                    if ( Math.pow(x - cx, 2) / (rx*rx) + Math.pow(y - cy, 2) / (ry*ry) <= 1 ) selectionMask[y * gridW + x] = true;
                }
            }
        }
    }
    hasSelection = selectionMask.some(v => v);
    updateSelectionOverlay();
}

function updateSelectionOverlay() {
    const w_px = selCanvas.width; const h_px = selCanvas.height;
    const scaleX = w_px / gridW; const scaleY = h_px / gridH;
    selCtx.clearRect(0, 0, w_px, h_px);
    
    if (isTransforming) {
        let cx = tBounds.x + tBounds.w / 2; let cy = tBounds.y + tBounds.h / 2;
        
        // Render Floating Pixels
        for (let gy = 0; gy < tOrigH; gy++) {
            for (let gx = 0; gx < tOrigW; gx++) {
                let col = tOrigPixels[gy * tOrigW + gx];
                if (col) {
                    selCtx.save();
                    selCtx.translate(cx * scaleX, cy * scaleY);
                    selCtx.rotate(tRotation);
                    selCtx.fillStyle = col;
                    selCtx.fillRect((gx - tOrigW/2) * (tBounds.w/tOrigW) * scaleX, (gy - tOrigH/2) * (tBounds.h/tOrigH) * scaleY, (tBounds.w/tOrigW)*scaleX + 0.5, (tBounds.h/tOrigH)*scaleY + 0.5);
                    selCtx.restore();
                }
            }
        }

        // Draw Transform Box
        selCtx.save();
        selCtx.translate(cx * scaleX, cy * scaleY);
        selCtx.rotate(tRotation);
        selCtx.strokeStyle = '#fff'; selCtx.setLineDash([4, 4]); selCtx.lineWidth = 1.5;
        selCtx.strokeRect((-tBounds.w/2) * scaleX, (-tBounds.h/2) * scaleY, tBounds.w * scaleX, tBounds.h * scaleY);
        selCtx.fillStyle = '#fff'; selCtx.setLineDash([]);
        const hs = 8;
        selCtx.fillRect((-tBounds.w/2) * scaleX - hs/2, (-tBounds.h/2) * scaleY - hs/2, hs, hs);
        selCtx.fillRect((tBounds.w/2) * scaleX - hs/2, (-tBounds.h/2) * scaleY - hs/2, hs, hs);
        selCtx.fillRect((-tBounds.w/2) * scaleX - hs/2, (tBounds.h/2) * scaleY - hs/2, hs, hs);
        selCtx.fillRect((tBounds.w/2) * scaleX - hs/2, (tBounds.h/2) * scaleY - hs/2, hs, hs);
        selCtx.beginPath(); selCtx.moveTo(0, (-tBounds.h/2) * scaleY); selCtx.lineTo(0, (-tBounds.h/2) * scaleY - 24); selCtx.stroke();
        selCtx.beginPath(); selCtx.arc(0, (-tBounds.h/2) * scaleY - 24, hs/1.5, 0, Math.PI*2); selCtx.fill();
        selCtx.restore();
        return;
    }

    if (hasSelection) {
        selCtx.fillStyle = 'rgba(64, 120, 255, 0.45)'; 
        for (let i = 0; i < gridW * gridH; i++) {
            if (selectionMask[i]) selCtx.fillRect((i % gridW) * scaleX, Math.floor(i / gridW) * scaleY, scaleX + 0.5, scaleY + 0.5);
        }
    }
}

function copySelection() {
    if(!hasSelection) return;
    clipboardBuffer = new Array(gridW * gridH).fill(null);
    let layerData = frames[currentFrameIdx][currentLayerIdx];
    for (let i = 0; i < gridW * gridH; i++) {
        if (selectionMask[i] && layerData[i]) clipboardBuffer[i] = layerData[i];
    }
    showToast('Kopiert (Ctrl+C)');
}

function cutSelection() {
    if(!hasSelection) return;
    if (layersLocked[currentLayerIdx]) { showToast('Ebene ist gesperrt!'); return; }
    copySelection();
    let layerData = frames[currentFrameIdx][currentLayerIdx];
    for (let i = 0; i < gridW * gridH; i++) if (selectionMask[i]) layerData[i] = null;
    renderCanvas(); saveState(); showToast('Ausgeschnitten (Ctrl+X)');
}

function pasteSelection() {
    if(!clipboardBuffer) return;
    if (layersLocked[currentLayerIdx]) { showToast('Ebene ist gesperrt!'); return; }
    let layerData = frames[currentFrameIdx][currentLayerIdx];
    for (let i = 0; i < gridW * gridH; i++) if (clipboardBuffer[i]) layerData[i] = clipboardBuffer[i];
    renderCanvas(); saveState(); showToast('Eingefügt (Ctrl+V)');
}

document.addEventListener('keydown', (e) => {
  if(e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT' || document.getElementById('setup-overlay').style.display !== 'none') return;
  
  if (e.ctrlKey && e.key.toLowerCase() === 'z') { e.preventDefault(); undo(); return; }
  if (e.ctrlKey && e.key.toLowerCase() === 'y') { e.preventDefault(); redo(); return; }
  if (e.ctrlKey && e.key.toLowerCase() === 'c') { e.preventDefault(); copySelection(); return; }
  if (e.ctrlKey && e.key.toLowerCase() === 'x') { e.preventDefault(); cutSelection(); return; }
  if (e.ctrlKey && e.key.toLowerCase() === 'v') { e.preventDefault(); pasteSelection(); return; }
  
  // Neue Funktionalität: Entf / Backspace
  if (e.key === 'Delete' || e.key === 'Backspace') {
      e.preventDefault();
      if (isTransforming) {
          isTransforming = false; tOrigPixels = null; clipboardBuffer = null; activeHandle = null; tRotation = 0;
          selectionMask.fill(false); hasSelection = false; selCtx.clearRect(0,0,selCanvas.width,selCanvas.height);
          saveState(); renderCanvas(); showToast('Transform gelöscht'); setTool('select-rect');
      } else if (hasSelection) {
          if (layersLocked[currentLayerIdx]) { showToast('Ebene ist gesperrt!'); return; }
          let layerData = frames[currentFrameIdx][currentLayerIdx]; let changed = false;
          for (let i = 0; i < gridW * gridH; i++) {
              if (selectionMask[i] && layerData[i]) { layerData[i] = null; changed = true; }
          }
          if (changed) { renderCanvas(); saveState(); showToast('Auswahl gelöscht'); }
      }
      return;
  }

  if (e.ctrlKey && e.key.toLowerCase() === 'd') { 
      e.preventDefault(); 
      if (isTransforming) cancelTransform();
      hasSelection = false; selectionMask.fill(false); updateSelectionOverlay(); 
      return; 
  }
  
  if (e.key === 'Enter') { if (isTransforming) { e.preventDefault(); commitTransform(); return; } }
  if (e.key === 'Escape') {
      if (isTransforming) { e.preventDefault(); cancelTransform(); return; }
      if (isSelecting || hasSelection) { e.preventDefault(); isSelecting = false; hasSelection = false; selectionMask.fill(false); updateSelectionOverlay(); return; }
  }

  if (e.ctrlKey && (e.key === '+' || e.key === '=')) { e.preventDefault(); setZoom(0.2); return; }
  if (e.ctrlKey && e.key === '-') { e.preventDefault(); setZoom(-0.2); return; }

  switch(e.key.toLowerCase()) {
    case 'b': setTool('draw'); break;
    case 'e': setTool('erase'); break;
    case 'g': setTool('fill'); break;
    case 'i': setTool('picker'); break;
    case 'h': setTool('pan'); break;
    case 'm': setTool('select-rect'); break;
    case 'c': setTool('select-circle'); break;
    case 'l': setTool('select-lasso'); break;
    case 'v': setTool('transform'); startTransform(); break; 
    case 'o': toggleOnionSkin(); break;
    case 's': toggleSymmetry(); break;
    case ' ': e.preventDefault(); toggleAnimation(); break;
  }
});

function saveState() {
  if (historyStep < history.length - 1) { history = history.slice(0, historyStep + 1); }
  history.push({ frames: JSON.parse(JSON.stringify(frames)), layersCount, layersLocked: [...layersLocked], gridW, gridH, fps, recentColors: [...recentColors] });
  if (history.length > 50) history.shift(); else historyStep++;
}

function loadState(state) {
  frames = JSON.parse(JSON.stringify(state.frames)); 
  layersCount = state.layersCount; 
  layersLocked = state.layersLocked ? [...state.layersLocked] : new Array(layersCount).fill(false);
  recentColors = [...state.recentColors];
  if(gridW !== state.gridW || gridH !== state.gridH) {
    gridW = state.gridW; gridH = state.gridH;
    mainCanvas.width = gridW; mainCanvas.height = gridH; prevCanvas.width = gridW; prevCanvas.height = gridH; 
    applyZoom();
  }
  fps = state.fps; document.getElementById('fps-slider').value = fps; document.getElementById('fps-val').innerText = fps;
  if (currentFrameIdx >= frames.length) currentFrameIdx = frames.length - 1;
  if (currentLayerIdx >= layersCount) currentLayerIdx = layersCount - 1;
  renderPaletteGrid('recent-grid', recentColors, false); renderCanvas(); updateLayersList(); updateFramesList();
}

function undo() { if (historyStep > 0) { historyStep--; loadState(history[historyStep]); showToast('Undo (Schritt zurück)'); } }
function redo() { if (historyStep < history.length - 1) { historyStep++; loadState(history[historyStep]); showToast('Redo (Schritt vor)'); } }

function updateBrushSize(val) { brushSize = parseInt(val); document.getElementById('brush-size-val').textContent = val; }
function setBrushShape(shape) { brushShape = shape; document.getElementById('shape-square').classList.toggle('active', shape === 'square'); document.getElementById('shape-circle').classList.toggle('active', shape === 'circle'); }

function setZoom(delta) { currentZoom += delta; if (currentZoom < 0.5) currentZoom = 0.5; if (currentZoom > 25) currentZoom = 25; applyZoom(); }
function resetZoom() { currentZoom = 1; applyZoom(); }

function applyZoom() {
  const maxDim = Math.max(gridW, gridH); const basePixelSize = 400 / maxDim;
  const w = gridW * basePixelSize * currentZoom; const h = gridH * basePixelSize * currentZoom;
  canvasContainer.style.width = w + 'px'; canvasContainer.style.height = h + 'px';
  canvasContainer.style.minWidth = w + 'px'; canvasContainer.style.minHeight = h + 'px';

  selCanvas.width = w; selCanvas.height = h;
  cursorCanvas.width = w; cursorCanvas.height = h;

  const gridOverlay = document.getElementById('grid-overlay');
  const cellW = w / gridW; const cellH = h / gridH;
  gridOverlay.style.backgroundSize = `${cellW}px ${cellH}px`;
  gridOverlay.style.opacity = (cellW < 4 || cellH < 4) ? '0' : '1';
  document.getElementById('zoom-val-display').innerText = Math.round(currentZoom * 100) + '%';

  updateSelectionOverlay();
}

function handleInteraction(idx) {
  if (hasSelection && !selectionMask[idx]) return; 
  if (currentTool === 'fill') { floodFill(idx); updateFramesList(); updateLayersList(); stateChanged = true; }
  else if (currentTool === 'picker') { 
      let picked = null;
      for(let l = layersCount - 1; l >= 0; l--) {
          if (frames[currentFrameIdx][l][idx]) { picked = frames[currentFrameIdx][l][idx]; break; }
      }
      if(picked) {
          if (!recentColors.includes(picked)) { recentColors.unshift(picked); if(recentColors.length > 50) recentColors.pop(); renderPaletteGrid('recent-grid', recentColors, false); }
          document.querySelectorAll('.color-swatch').forEach(el => el.classList.remove('active')); currentColor = picked; setTool('draw');
          setTimeout(() => { const rGrid = document.getElementById('recent-grid'); if(rGrid.firstChild) rGrid.firstChild.classList.add('active'); }, 50);
      }
  }
  else paintPixel(idx);
}

function paintPixel(centerIdx) {
  if (layersLocked[currentLayerIdx]) { showToast('Ebene ist gesperrt!'); return; }
  const color = currentTool === 'erase' ? null : currentColor;
  const cx = centerIdx % gridW; const cy = Math.floor(centerIdx / gridW);
  const symX = gridW - 1 - cx;

  const r1 = Math.floor((brushSize - 1) / 2); const r2 = Math.floor(brushSize / 2);
  let pixelsToUpdate = new Set();

  for (let dy = -r1; dy <= r2; dy++) {
    for (let dx = -r1; dx <= r2; dx++) {
      if (brushShape === 'circle' && brushSize > 2) {
        if (brushSize === 3 && Math.abs(dx) === 1 && Math.abs(dy) === 1) continue; 
        if (brushSize > 3 && Math.sqrt(dx*dx + dy*dy) >= brushSize / 2) continue;
      }

      let nx = cx + dx; let ny = cy + dy;
      if (nx >= 0 && nx < gridW && ny >= 0 && ny < gridH) pixelsToUpdate.add(ny * gridW + nx);
      if (symmetryEnabled) {
        let nsx = symX - dx;
        if (nsx >= 0 && nsx < gridW && ny >= 0 && ny < gridH) pixelsToUpdate.add(ny * gridW + nsx);
      }
    }
  }

  pixelsToUpdate.forEach(idx => {
     if (hasSelection && !selectionMask[idx]) return; 
     if(frames[currentFrameIdx][currentLayerIdx][idx] !== color) {
        frames[currentFrameIdx][currentLayerIdx][idx] = color;
        updateCanvasPixel(idx);
        stateChanged = true;
     }
  });

  if(stateChanged && !isAnimPlaying) drawPreview(currentFrameIdx);
}

function floodFill(startIdx) {
  if (layersLocked[currentLayerIdx]) { showToast('Ebene ist gesperrt!'); return; }
  const targetColor = frames[currentFrameIdx][currentLayerIdx][startIdx];
  if (targetColor === currentColor) return;
  const queue = [startIdx]; const visited = new Set();
  frames[currentFrameIdx][currentLayerIdx][startIdx] = currentColor; visited.add(startIdx);

  while(queue.length > 0) {
    const curr = queue.shift(); const x = curr % gridW; const y = Math.floor(curr / gridW);
    const neighbors = [{x: x, y: y-1}, {x: x, y: y+1}, {x: x-1, y: y}, {x: x+1, y: y}];
    for(let n of neighbors) {
      if(n.x >= 0 && n.x < gridW && n.y >= 0 && n.y < gridH) {
        const nIdx = n.y * gridW + n.x;
        if (hasSelection && !selectionMask[nIdx]) continue;
        if(!visited.has(nIdx) && frames[currentFrameIdx][currentLayerIdx][nIdx] === targetColor) {
          frames[currentFrameIdx][currentLayerIdx][nIdx] = currentColor; visited.add(nIdx); queue.push(nIdx);
        }
      }
    }
  }
  renderCanvas(); if(!isAnimPlaying) drawPreview(currentFrameIdx);
}

function updateCanvasPixel(idx) {
  const x = idx % gridW; const y = Math.floor(idx / gridW);
  mainCtx.clearRect(x, y, 1, 1);
  if (onionSkinEnabled && currentFrameIdx > 0) {
    mainCtx.globalAlpha = 0.3;
    for(let l = 0; l < layersCount; l++) {
        if (frames[currentFrameIdx - 1][l][idx]) { mainCtx.fillStyle = frames[currentFrameIdx - 1][l][idx]; mainCtx.fillRect(x, y, 1, 1); }
    }
    mainCtx.globalAlpha = 1.0;
  }
  for(let l = 0; l < layersCount; l++) { 
      if (frames[currentFrameIdx][l][idx]) { mainCtx.fillStyle = frames[currentFrameIdx][l][idx]; mainCtx.fillRect(x, y, 1, 1); }
  }
}

function addCustomColor() {
  const hex = document.getElementById('custom-picker').value; 
  const alpha = parseFloat(document.getElementById('custom-alpha').value);
  const c = alpha < 1 ? hexToRgba(hex, alpha) : hex;
  
  if (!recentColors.includes(c)) { 
      recentColors.unshift(c); 
      if(recentColors.length > 50) recentColors.pop(); 
      renderPaletteGrid('recent-grid', recentColors, false); 
  }
  document.querySelectorAll('.color-swatch').forEach(el => el.classList.remove('active'));
  currentColor = c; setTool('draw');
}

function setTool(tool) {
  if (isTransforming && !tool.startsWith('select') && tool !== 'pan' && tool !== 'transform') commitTransform();
  currentTool = tool;
  updateCursorStyle();
  ['draw', 'erase', 'fill', 'picker', 'pan', 'select-rect', 'select-circle', 'select-lasso'].forEach(t => {
    const el = document.getElementById(`tool-${t}`); if (el) el.classList.toggle('active', tool === t);
  });
}

function toggleOnionSkin() {
  onionSkinEnabled = !onionSkinEnabled; const btn = document.getElementById('tool-onion'); btn.classList.toggle('active', onionSkinEnabled);
  btn.innerHTML = `<svg class="svg-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="8" stroke="currentColor" stroke-width="2" fill="none" stroke-dasharray="4 2"/></svg> Onion Skin: ${onionSkinEnabled ? 'An' : 'Aus'}`; renderCanvas();
}

function toggleSymmetry() {
  symmetryEnabled = !symmetryEnabled; const btn = document.getElementById('tool-sym'); btn.classList.toggle('active', symmetryEnabled);
  btn.innerHTML = `<svg class="svg-icon" viewBox="0 0 24 24"><path d="M12,2L12,22M4,8L4,16L10,12Z" stroke="currentColor" stroke-width="2" fill="none"/></svg> Symmetrie: ${symmetryEnabled ? 'An' : 'Aus'}`;
}

// ── LAYER DRAG & DROP ──
function addLayer() { 
  frames.forEach(f => f.push(Array(gridW * gridH).fill(null))); 
  layersCount++; layersLocked.push(false); currentLayerIdx = layersCount - 1; 
  updateLayersList(); renderCanvas(); saveState(); 
}

function deleteLayer(idx) {
  if (layersCount <= 1) { frames.forEach(f => f[0] = Array(gridW * gridH).fill(null)); layersLocked[0] = false; } 
  else { 
    frames.forEach(f => f.splice(idx, 1)); layersCount--; layersLocked.splice(idx, 1);
    if (currentLayerIdx >= layersCount) currentLayerIdx = layersCount - 1; 
  }
  updateLayersList(); renderCanvas(); saveState();
}

function updateLayersList() {
  const list = document.getElementById('layers-list'); list.innerHTML = '';
  for (let i = layersCount - 1; i >= 0; i--) {
    const item = document.createElement('div'); item.className = 'layer-item' + (i === currentLayerIdx ? ' active' : '');
    if (layersLocked[i]) item.classList.add('locked');
    item.draggable = true;
    
    item.ondragstart = (e) => { draggedLayerIdx = i; e.dataTransfer.effectAllowed = 'move'; setTimeout(() => item.classList.add('dragging'), 0); };
    item.ondragover = (e) => {
        e.preventDefault(); e.dataTransfer.dropEffect = 'move';
        const rect = item.getBoundingClientRect(); const relY = e.clientY - rect.top;
        item.classList.remove('drag-over-top', 'drag-over-bottom');
        if (relY < rect.height / 2) item.classList.add('drag-over-top'); else item.classList.add('drag-over-bottom');
    };
    item.ondragleave = () => item.classList.remove('drag-over-top', 'drag-over-bottom');
    item.ondrop = (e) => {
        e.preventDefault(); item.classList.remove('drag-over-top', 'drag-over-bottom');
        if (draggedLayerIdx === null || draggedLayerIdx === i) return;
        const rect = item.getBoundingClientRect(); const relY = e.clientY - rect.top;
        let insertIdx = (relY < rect.height / 2) ? i + 1 : i;
        if (draggedLayerIdx < insertIdx) insertIdx--;
        if (draggedLayerIdx === insertIdx) return;

        frames.forEach(f => { const movedLayer = f.splice(draggedLayerIdx, 1)[0]; f.splice(insertIdx, 0, movedLayer); });
        const movedLock = layersLocked.splice(draggedLayerIdx, 1)[0]; layersLocked.splice(insertIdx, 0, movedLock);
        if (currentLayerIdx === draggedLayerIdx) currentLayerIdx = insertIdx;
        else if (currentLayerIdx > draggedLayerIdx && currentLayerIdx <= insertIdx) currentLayerIdx--;
        else if (currentLayerIdx < draggedLayerIdx && currentLayerIdx >= insertIdx) currentLayerIdx++;
        
        draggedLayerIdx = null; updateLayersList(); renderCanvas(); saveState();
    };
    item.ondragend = () => { item.classList.remove('dragging'); draggedLayerIdx = null; updateLayersList(); };

    item.onclick = (e) => { if(!e.target.closest('.item-btn')) { currentLayerIdx = i; updateLayersList(); } };
    const label = document.createElement('div'); label.className = 'item-label'; label.textContent = `Ebene ${i + 1}`;
    
    const lockBtn = document.createElement('button'); lockBtn.className = 'item-btn lock-btn';
    lockBtn.innerHTML = layersLocked[i] ? 
        '<svg class="svg-icon" viewBox="0 0 24 24"><path d="M12 17a2 2 0 0 0 2-2 2 2 0 0 0-2-2 2 2 0 0 0-2 2 2 2 0 0 0 2 2m6-9a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V10a2 2 0 0 1 2-2h1V6a5 5 0 0 1 5-5 5 5 0 0 1 5 5v2h1m-6-5a3 3 0 0 0-3 3v2h6V6a3 3 0 0 0-3-3z"/></svg>' : 
        '<svg class="svg-icon" viewBox="0 0 24 24"><path d="M18 8a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V10a2 2 0 0 1 2-2h1V6a5 5 0 0 1 5-5 5 5 0 0 1 5 5v2h-2V6a3 3 0 0 0-3-3 3 3 0 0 0-3 3v2h10m-6 9a2 2 0 0 0 2-2 2 2 0 0 0-2-2 2 2 0 0 0-2 2 2 2 0 0 0 2 2z" opacity="0.3"/></svg>';
    lockBtn.onclick = (e) => { e.stopPropagation(); layersLocked[i] = !layersLocked[i]; updateLayersList(); saveState(); };

    const delBtn = document.createElement('button'); delBtn.className = 'item-btn';
    delBtn.innerHTML = '<svg class="svg-icon" viewBox="0 0 24 24"><path d="M19,4H15.5L14.5,3H9.5L8.5,4H5V6H19M6,19A2,2 0 0,0 8,21H16A2,2 0 0,0 18,19V7H6V19Z"/></svg>';
    delBtn.onclick = (e) => { e.stopPropagation(); deleteLayer(i); };
    
    item.appendChild(label); item.appendChild(lockBtn); item.appendChild(delBtn); list.appendChild(item);
  }
  window.attachCursorEvents();
}

function renderCanvas() {
  mainCtx.clearRect(0, 0, gridW, gridH);
  if (onionSkinEnabled && currentFrameIdx > 0) {
    mainCtx.globalAlpha = 0.3;
    for(let l = 0; l < layersCount; l++) {
      for(let i = 0; i < gridW * gridH; i++) {
        if (frames[currentFrameIdx - 1][l][i]) { mainCtx.fillStyle = frames[currentFrameIdx - 1][l][i]; mainCtx.fillRect(i % gridW, Math.floor(i / gridW), 1, 1); }
      }
    }
    mainCtx.globalAlpha = 1.0;
  }
  for(let l = 0; l < layersCount; l++) {
    for (let i = 0; i < gridW * gridH; i++) {
      if (frames[currentFrameIdx][l][i]) { mainCtx.fillStyle = frames[currentFrameIdx][l][i]; mainCtx.fillRect(i % gridW, Math.floor(i / gridW), 1, 1); }
    }
  }
  updateFramesList(); if(!isAnimPlaying) drawPreview(currentFrameIdx);
}

function addFrame() { const newFrame = []; for(let l=0; l<layersCount; l++) newFrame.push(Array(gridW * gridH).fill(null)); frames.push(newFrame); currentFrameIdx = frames.length - 1; renderCanvas(); saveState(); }
function copyFrame() { const clone = frames[currentFrameIdx].map(layer => [...layer]); frames.push(clone); currentFrameIdx = frames.length - 1; renderCanvas(); saveState(); }
function deleteFrame(idx) {
  if (frames.length === 1) { frames[0] = []; for(let l=0; l<layersCount; l++) frames[0].push(Array(gridW * gridH).fill(null)); } 
  else { frames.splice(idx, 1); if (currentFrameIdx >= frames.length) currentFrameIdx = frames.length - 1; }
  renderCanvas(); saveState();
}

function updateFramesList() {
  const list = document.getElementById('frames-list'); list.innerHTML = '';
  frames.forEach((f, idx) => {
    const item = document.createElement('div'); item.className = 'frame-item' + (idx === currentFrameIdx ? ' active' : ''); item.draggable = true;
    item.ondragstart = (e) => { draggedFrameIdx = idx; e.dataTransfer.effectAllowed = 'move'; setTimeout(() => item.classList.add('dragging'), 0); };
    item.ondragover = (e) => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; item.classList.add('drag-over'); };
    item.ondragleave = () => item.classList.remove('drag-over');
    item.ondrop = (e) => { e.preventDefault(); item.classList.remove('drag-over'); if (draggedFrameIdx === null || draggedFrameIdx === idx) return; const movedFrame = frames.splice(draggedFrameIdx, 1)[0]; frames.splice(idx, 0, movedFrame); currentFrameIdx = idx; renderCanvas(); saveState(); };
    item.ondragend = () => { item.classList.remove('dragging'); draggedFrameIdx = null; updateFramesList(); };
    item.onclick = (e) => { if(!e.target.closest('.item-btn')) { currentFrameIdx = idx; renderCanvas(); } };
    
    const thumb = document.createElement('canvas'); thumb.className = 'item-thumb'; thumb.width = gridW; thumb.height = gridH;
    const ctx = thumb.getContext('2d');
    for(let l = 0; l < layersCount; l++) {
      for(let i = 0; i < gridW * gridH; i++) {
        if(frames[idx][l][i]) { ctx.fillStyle = frames[idx][l][i]; ctx.fillRect(i % gridW, Math.floor(i / gridW), 1, 1); }
      }
    }

    const label = document.createElement('div'); label.className = 'item-label'; label.textContent = `Frame ${idx + 1}`;
    const delBtn = document.createElement('button'); delBtn.className = 'item-btn';
    delBtn.innerHTML = '<svg class="svg-icon" viewBox="0 0 24 24"><path d="M19,4H15.5L14.5,3H9.5L8.5,4H5V6H19M6,19A2,2 0 0,0 8,21H16A2,2 0 0,0 18,19V7H6V19Z"/></svg>';
    delBtn.onclick = (e) => { e.stopPropagation(); deleteFrame(idx); };
    item.appendChild(thumb); item.appendChild(label); item.appendChild(delBtn); list.appendChild(item);
  });
  window.attachCursorEvents();
}

function updateFPS(val) { fps = val; document.getElementById('fps-val').textContent = val; if(isAnimPlaying) startAnimation(); }
function toggleAnimation() {
  isAnimPlaying = !isAnimPlaying; const btn = document.getElementById('anim-toggle');
  if(isAnimPlaying) { btn.innerHTML = '<svg class="svg-icon" viewBox="0 0 24 24"><path d="M14,19H18V5H14M6,19H10V5H6V19Z"/></svg> Pause'; startAnimation(); } 
  else { btn.innerHTML = '<svg class="svg-icon" viewBox="0 0 24 24"><path d="M8,5.14V19.14L19,12.14L8,5.14Z"/></svg> Play'; clearInterval(animTimer); drawPreview(currentFrameIdx); }
}
function startAnimation() { if (animTimer) clearInterval(animTimer); animTimer = setInterval(() => { animFrame = (animFrame + 1) % frames.length; drawPreview(animFrame); }, 1000 / fps); }

function drawPreview(fIdx) { 
  prevCtx.clearRect(0, 0, gridW, gridH); 
  for(let l = 0; l < layersCount; l++) {
    for (let i = 0; i < gridW * gridH; i++) {
      if (frames[fIdx][l][i]) { prevCtx.fillStyle = frames[fIdx][l][i]; prevCtx.fillRect(i % gridW, Math.floor(i / gridW), 1, 1); }
    }
  }
}

function exportGIF() {
  if (frames.length === 1) { exportSinglePNG(); return; }
  if (typeof GIF === 'undefined' || !gifWorkerURL) { alert("GIF Modul offline! Bitte nutze den PNG-Export."); return; }
  showToast('Generiere GIF...');
  const gif = new GIF({ workers: 2, quality: 10, width: gridW, height: gridH, workerScript: gifWorkerURL, transparent: 'rgba(0,0,0,0)' });
  frames.forEach((f, idx) => {
    const canvas = document.createElement('canvas'); canvas.width = gridW; canvas.height = gridH;
    const ctx = canvas.getContext('2d');
    for(let l = 0; l < layersCount; l++) {
      for(let i = 0; i < gridW * gridH; i++) {
        if (frames[idx][l][i]) { ctx.fillStyle = frames[idx][l][i]; ctx.fillRect(i % gridW, Math.floor(i / gridW), 1, 1); }
      }
    }
    gif.addFrame(canvas, {delay: 1000 / fps});
  });
  gif.on('finished', function(blob) { const link = document.createElement('a'); link.download = `mustno_anim_${gridW}x${gridH}_${fps}fps.gif`; link.href = URL.createObjectURL(blob); link.click(); showToast('GIF erfolgreich exportiert!'); });
  gif.render();
}

function exportSinglePNG() {
  const canvas = document.createElement('canvas'); canvas.width = gridW; canvas.height = gridH;
  const ctx = canvas.getContext('2d');
  for(let l = 0; l < layersCount; l++) {
    for(let i = 0; i < gridW * gridH; i++) {
      if (frames[currentFrameIdx][l][i]) { ctx.fillStyle = frames[currentFrameIdx][l][i]; ctx.fillRect(i % gridW, Math.floor(i / gridW), 1, 1); }
    }
  }
  const link = document.createElement('a'); link.download = `mustno_sprite_${gridW}x${gridH}.png`; link.href = canvas.toDataURL('image/png'); link.click(); showToast('Bild erfolgreich exportiert!');
}

function exportSpriteSheet() {
  const canvas = document.createElement('canvas'); canvas.width = gridW * frames.length; canvas.height = gridH;
  const ctx = canvas.getContext('2d');
  frames.forEach((f, fIdx) => { 
    for(let l = 0; l < layersCount; l++) {
      for(let i = 0; i < gridW * gridH; i++) {
        if (frames[fIdx][l][i]) { ctx.fillStyle = frames[fIdx][l][i]; ctx.fillRect((fIdx * gridW) + (i % gridW), Math.floor(i / gridW), 1, 1); }
      }
    }
  });
  const link = document.createElement('a'); link.download = `mustno_spritesheet_${gridW}x${gridH}_f${frames.length}.png`; link.href = canvas.toDataURL('image/png'); link.click(); showToast('Spritesheet exportiert!');
}

function exportPNGSequence() {
  frames.forEach((f, idx) => {
    const canvas = document.createElement('canvas'); canvas.width = gridW; canvas.height = gridH;
    const ctx = canvas.getContext('2d');
    for(let l = 0; l < layersCount; l++) {
      for(let i = 0; i < gridW * gridH; i++) {
        if (frames[idx][l][i]) { ctx.fillStyle = frames[idx][l][i]; ctx.fillRect(i % gridW, Math.floor(i / gridW), 1, 1); }
      }
    }
    const link = document.createElement('a'); link.download = `frame_${idx+1}.png`; link.href = canvas.toDataURL('image/png'); setTimeout(() => link.click(), idx * 100);
  });
  showToast('PNG-Sequenz heruntergeladen!');
}

function saveProject() {
  const project = { version: "1.2", gridW, gridH, layersCount, layersLocked, fps, frames: JSON.parse(JSON.stringify(frames)), recentColors };
  const blob = new Blob([JSON.stringify(project)], {type: "application/json"});
  const link = document.createElement("a"); link.href = URL.createObjectURL(blob); link.download = `mustno_project_${gridW}x${gridH}.json`; link.click(); showToast('Projekt gespeichert!');
}

function importProject(event) {
  const file = event.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const proj = JSON.parse(e.target.result);
      gridW = proj.gridW || proj.gridSize; gridH = proj.gridH || proj.gridSize;
      layersCount = proj.layersCount || 1; layersLocked = proj.layersLocked ? [...proj.layersLocked] : new Array(layersCount).fill(false);
      fps = proj.fps || 8; frames = proj.frames; recentColors = proj.recentColors || [];
      document.getElementById('setup-overlay').style.display = 'none'; document.getElementById('lab-main').style.display = 'flex';
      mainCanvas.width = gridW; mainCanvas.height = gridH; prevCanvas.width = gridW; prevCanvas.height = gridH; selCanvas.width = gridW; selCanvas.height = gridH;
      applyZoom(); currentFrameIdx = 0; currentLayerIdx = 0;
      renderPaletteGrid('recent-grid', recentColors, false); renderCanvas(); updateLayersList(); updateFramesList();
      document.getElementById('fps-slider').value = fps; updateFPS(fps);
      history = []; historyStep = -1; saveState(); showToast('Projekt geladen!');
    } catch(err) { alert("Fehler beim Laden!"); }
  };
  reader.readAsText(file); event.target.value = '';
}

// ==========================================
// ── PREMIUM AUDIO SYSTEM LOGIC ──
// ==========================================
const AUDIO_CFG = {
  sfx: { hover: '/sfx-hover.mp3', click: '/sfx-click.mp3' },
  bgm: {
    'default':         ['/cyber-1.mp3', '/cyber-2.mp3'],
    'theme-wii':       ['/wii-1.mp3',   '/wii-2.mp3'],
    'theme-retro':     ['/retro-1.mp3', '/retro-2.mp3'],
    'theme-cyberpunk': ['/cyberpunk-1.mp3', '/cyberpunk-2.mp3']
  }
};
AUDIO_CFG.bgm['theme-custom'] = [...new Set(Object.values(AUDIO_CFG.bgm).flat())];

const bgmAudio = new Audio(); 
bgmAudio.volume = 1;
bgmAudio.loop = false;
bgmAudio.preload = 'auto'; 

let isPlaying = localStorage.getItem('mustno-bgm-play') === 'true'; 
let trackIdx = parseInt(localStorage.getItem('mustno-track-idx')) || 0;

function getCurrentPlaylist() {
  const tName = document.body.className || 'default';
  return AUDIO_CFG.bgm[tName] || AUDIO_CFG.bgm['default'];
}

function updateBgmUI() {
  const w = document.getElementById('audio-widget');
  const pIcon = document.getElementById('icon-play');
  const pauseIcon = document.getElementById('icon-pause');
  const tName = document.getElementById('bgm-track-name');
  
  if (!w) return;
  if (isPlaying) { 
    w.classList.add('is-playing'); 
    if(pIcon) pIcon.style.display = 'none'; 
    if(pauseIcon) pauseIcon.style.display = 'block'; 
  } else { 
    w.classList.remove('is-playing'); 
    if(pIcon) pIcon.style.display = 'block'; 
    if(pauseIcon) pauseIcon.style.display = 'none'; 
  }
  
  const playlist = getCurrentPlaylist();
  const safeIdx = (trackIdx % playlist.length) || 0;
  if(tName) tName.textContent = `TRACK 0${safeIdx + 1}`;
}

function initAudioSrc() {
  const playlist = getCurrentPlaylist();
  const safeIdx = (trackIdx % playlist.length) || 0;
  const newSrc = playlist[safeIdx];
  if (!bgmAudio.src || !bgmAudio.src.endsWith(newSrc)) {
    bgmAudio.src = newSrc;
    bgmAudio.load();
  }
}

window.playCurrentTrack = function() {
  initAudioSrc();
  if (isPlaying) {
    bgmAudio.play().catch(e => console.warn("Auto-Play blockiert:", e));
  }
  updateBgmUI();
}

window.toggleBGM = function() {
  initAudioSrc(); // Ensure source is set
  if (bgmAudio.paused) { 
    bgmAudio.play().then(() => { 
      isPlaying = true; 
      localStorage.setItem('mustno-bgm-play', 'true');
      updateBgmUI(); 
    }).catch(e => console.warn("Play-Fehler:", e)); 
  } else { 
    bgmAudio.pause(); 
    isPlaying = false; 
    localStorage.setItem('mustno-bgm-play', 'false');
    updateBgmUI(); 
  }
};

window.nextTrack = function() {
  const playlist = getCurrentPlaylist();
  trackIdx = (trackIdx + 1) % playlist.length; 
  localStorage.setItem('mustno-track-idx', trackIdx);
  localStorage.setItem('mustno-bgm-time', '0');
  isPlaying = true; 
  localStorage.setItem('mustno-bgm-play', 'true');
  playCurrentTrack(); 
};

bgmAudio.addEventListener('ended', window.nextTrack);

function formatTime(seconds) {
  if (isNaN(seconds) || !isFinite(seconds)) return "0:00";
  const m = Math.floor(seconds / 60);
  const s = Math.floor(seconds % 60).toString().padStart(2, '0');
  return `${m}:${s}`;
}

// Force visual update helper
function forceVisualUpdate(percent, currentTime, duration) {
  const prog = document.getElementById('bgm-progress');
  const timeDisp = document.getElementById('bgm-time');
  if (prog) {
    prog.style.transition = 'none'; 
    prog.style.width = (percent * 100) + '%';
    void prog.offsetWidth; 
    prog.style.transition = 'width 0.1s linear, background 0.3s';
  }
  if (timeDisp) timeDisp.innerText = `${formatTime(currentTime)} / ${formatTime(duration)}`;
}

bgmAudio.addEventListener('timeupdate', () => {
  if (bgmAudio.duration) {
    const percent = (bgmAudio.currentTime / bgmAudio.duration);
    const prog = document.getElementById('bgm-progress');
    const timeDisp = document.getElementById('bgm-time');
    if (prog) prog.style.width = (percent * 100) + '%';
    if (timeDisp) timeDisp.innerText = `${formatTime(bgmAudio.currentTime)} / ${formatTime(bgmAudio.duration)}`;
  }
});

bgmAudio.addEventListener('loadedmetadata', () => {
  // Set visual to 0 on initial load
  forceVisualUpdate(0, 0, bgmAudio.duration);
});

window.seekAudio = function(e) {
  initAudioSrc(); // Ensure we have a track
  
  const rect = e.currentTarget.getBoundingClientRect();
  const clickX = e.clientX - rect.left;
  const percent = Math.max(0, Math.min(1, clickX / rect.width));
  
  if (isNaN(bgmAudio.duration) || !bgmAudio.duration) {
      // If metadata is not yet loaded, wait for it
      bgmAudio.addEventListener('loadedmetadata', function onMeta() {
          bgmAudio.currentTime = percent * bgmAudio.duration;
          forceVisualUpdate(percent, bgmAudio.currentTime, bgmAudio.duration);
          bgmAudio.removeEventListener('loadedmetadata', onMeta);
      });
      return;
  }
  
  bgmAudio.currentTime = percent * bgmAudio.duration;
  forceVisualUpdate(percent, bgmAudio.currentTime, bgmAudio.duration);
};

document.addEventListener('DOMContentLoaded', () => {
  // 1. Theme Dropdown
  if (typeof updateThemeDropdowns === 'function') {
    updateThemeDropdowns();
    const loadedTheme = localStorage.getItem('mustno-theme') || '';
    if (loadedTheme && typeof window.changeTheme === 'function') window.changeTheme(loadedTheme, true);
  }
  
  // 2. Audio Setup: Restore saved position and auto-resume
  initAudioSrc();
  const savedTime = parseFloat(localStorage.getItem('mustno-bgm-time')) || 0;
  if (savedTime > 0) bgmAudio.currentTime = savedTime;
  updateBgmUI();

  if (isPlaying) {
    bgmAudio.play().catch(e => {});
    // Fallback: resume on first user interaction
    const resumeAutoplay = () => {
      if (isPlaying && bgmAudio.paused) {
        bgmAudio.play().catch(e => {});
      }
      document.removeEventListener('click', resumeAutoplay, true);
      document.removeEventListener('keydown', resumeAutoplay, true);
      document.removeEventListener('touchstart', resumeAutoplay, true);
    };
    document.addEventListener('click', resumeAutoplay, { capture: true, once: true });
    document.addEventListener('keydown', resumeAutoplay, { capture: true, once: true });
    document.addEventListener('touchstart', resumeAutoplay, { capture: true, once: true });
  }

// 3. Globaler Cursor-Fix (Funktioniert immer, auch bei Custom Themes)
document.addEventListener('mouseover', (e) => {
  const el = e.target.closest('button, a, .color-swatch, .layer-item, .frame-item, select, input, .zoom-btn, .audio-btn, .audio-progress-bg');
  const cur = document.getElementById('cur');
  
  if (cur) {
    if (el) {
      if (el.classList.contains('audio-btn')) {
        cur.style.transform = 'scale(1)'; // Play und Skip vergrößern Cursor NICHT
      } else if (el.classList.contains('audio-progress-bg')) {
        cur.style.transform = 'scale(1.8)'; // Seekbar erhält einen kleineren scale
      } else {
        cur.style.transform = 'scale(2.5)'; // Alle anderen Buttons und Links normal vergrößern
      }
    } else {
      cur.style.transform = 'scale(1)';
    }
  }
  
  // Sound-Trigger (einmalig pro Element binden)
  if (el && !el.dataset.cursorAttached) {
    el.addEventListener('click', () => {
      if(typeof sfxClick !== 'undefined') { sfxClick.currentTime = 0; sfxClick.play().catch(()=>{}); }
    });
    el.dataset.cursorAttached = 'true';
  }
});

// Leere Funktion lassen, damit der MutationObserver keine Fehler wirft
window.attachCursorEvents = () => {};

  // --- DER ULTIMATIVE FIX FÜR DAS CUSTOM THEME ---

  // 1. Observer: Repariert lautlos die Hover-Effekte, wenn theme.js neue Elemente lädt
  const observer = new MutationObserver(() => {
    if (typeof window.attachCursorEvents === 'function') window.attachCursorEvents();
  });
  observer.observe(document.body, { childList: true, subtree: true });

// 2. Erzwungener Klick: Absolute Priorität für den Workspace-Start
  const forceStart = (e) => {
    const btn = e.target.closest('button');
    if (btn && (btn.getAttribute('onclick')?.includes('startProject') || btn.innerText.toUpperCase().includes('WORKSPACE ÖFFNEN'))) {
      e.stopImmediatePropagation(); // Stoppt alle anderen Skripte (wie theme.js)
      e.preventDefault();
      if (typeof window.pauseAllGames === 'function') window.pauseAllGames();
      startProject();
    }
  };
  window.addEventListener('mousedown', forceStart, true);
  window.addEventListener('click', forceStart, true);
}); // <-- Ende des DOMContentLoaded Blocks

// Speichert Audio-Fortschritt
setInterval(() => { if (!bgmAudio.paused) localStorage.setItem('mustno-bgm-time', bgmAudio.currentTime); }, 1000);
</script>
